<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <style>
        .glow {
            animation: pulse-glow 1.5s infinite alternate;
        }
        @keyframes pulse-glow {
            0% { filter: drop-shadow(0 0 5px #0ff); opacity: 0.8;}
            100% { filter: drop-shadow(0 0 15px #0ff); opacity: 1;}
        }
    </style>
    <!-- Skull shape -->
    <path d="M20 40 Q50 0 80 40 V65 Q50 95 20 65 Z" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    
    <!-- Eyes -->
    <circle cx="35" cy="45" r="14" fill="#000000" />
    <circle cx="65" cy="45" r="14" fill="#000000" />
    
    <!-- Glowing Blue Eye (Left) -->
    <circle cx="35" cy="45" r="4" fill="#00ffff" class="glow" />
    <!-- Very faint white pupil (Right) -->
    <circle cx="65" cy="45" r="1" fill="#ffffff" opacity="0.6"/>

    <!-- Nose -->
    <polygon points="50,55 45,65 55,65" fill="#000000" />
    
    <!-- Wide Grin -->
    <path d="M25 75 Q50 88 75 75" fill="none" stroke="#000000" stroke-width="5" stroke-linecap="round" />
    <!-- Teeth Lines -->
    <line x1="35" y1="73" x2="35" y2="80" stroke="#000000" stroke-width="3" />
    <line x1="45" y1="77" x2="45" y2="83" stroke="#000000" stroke-width="3" />
    <line x1="55" y1="77" x2="55" y2="83" stroke="#000000" stroke-width="3" />
    <line x1="65" y1="73" x2="65" y2="80" stroke="#000000" stroke-width="3" />
</svg>
